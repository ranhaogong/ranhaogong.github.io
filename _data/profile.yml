  <p>
    Hi! I am Haoran Gong (公昊苒). I am currently a PhD student at <a href="https://www.xjtu.edu.cn/">Xi'an Jiaotong University</a>, 3DSAIL Lab, supervised by <a href="https://gr.xjtu.edu.cn/en/web/diwang">Di Wang</a>. I obtained my bachelor's degree from <a href="https://www.jlu.edu.cn/">Jilin University</a>. My research interests include computer vision, point clouds, and 3D reconstruction.
  </p>
