short_bio: >-
  <p>
    Hi! I am Haoran Gong (公昊苒). I am currently a PhD student at <a href="https://www.xjtu.edu.cn/">Xi'an Jiaotong University</a>, enrolled in a joint PhD program with the <a href="https://bza.edu.cn/">Beijing Zhongguancun Academy</a>. I am supervised by <a href="http://gr.xjtu.edu.cn/web/cxwang/">Chenxu Wang</a> at XJTU and co-supervised by <a href="http://staff.ustc.edu.cn/~chenzhibo/">Zhibo Chen</a> at USTC. During my master’s studies, I was supervised by Prof. <a href="http://gr.xjtu.edu.cn/web/diwang/">Di Wang</a> and conducted my research at the 3DSAIL Lab. I obtained my bachelor's degree from <a href="https://www.jlu.edu.cn/">Jilin University</a>. My research interests include world model, 3D generation, and 3D reconstruction.
  </p>
  <p>
    I am always open to collaboration and would be glad to discuss—please feel free to reach out.
  </p>
